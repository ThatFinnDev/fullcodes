# This workflow builds and deploys a Jekyll site with a main domain and two subdomains.

name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job for main site and subdomains
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 1

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      # Build Main Site
      - name: Build Main Site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      # Build Tubeball Subdomain
      - name: Build Tubeball Subdomain
        run: bundle exec jekyll build --config _config_tubeball.yml -d _site_tubeball
        env:
          JEKYLL_ENV: production

      # Build Quixx Subdomain
      - name: Build Quixx Subdomain
        run: bundle exec jekyll build --config _config_quixx.yml -d _site_quixx
        env:
          JEKYLL_ENV: production

      # Upload Main Site Artifact with a unique name
      - name: Upload Main Site Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
          name: github-pages

      # Upload Tubeball Subdomain Artifact with a unique name
      - name: Upload Tubeball Subdomain Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site_tubeball
          name: tubeball-site-artifact-${{ github.run_id }}

      # Upload Quixx Subdomain Artifact with a unique name
      - name: Upload Quixx Subdomain Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site_quixx
          name: quixx-site-artifact-${{ github.run_id }}

  # Deployment job for main site
  deploy-main:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Main Site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact-name: github-pages

  # Deployment job for Tubeball subdomain
  deploy-tubeball:
    environment:
      name: tubeball-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Tubeball Subdomain to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact-name: tubeball-site-artifact-${{ github.run_id }}

  # Deployment job for Quixx subdomain
  deploy-quixx:
    environment:
      name: quixx-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Quixx Subdomain to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact-name: quixx-site-artifact-${{ github.run_id }}
